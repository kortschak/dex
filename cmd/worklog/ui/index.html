<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>worklog</title>
		<style>
			:root {
				--spacing: 1rem;
				--chart-min-height: 250px;
				--chart-medium-height: 400px;
				--chart-large-height: 600px;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				padding: var(--spacing);
				font-family: sans-serif;
				overflow-x: auto;
			}

			.dashboard-container {
				display: grid;
				grid-template-columns: 1fr;
				gap: var(--spacing);
				max-width: 100%;
				width: 100%;
			}

			.chart-row {
				display: grid;
				grid-template-columns: 1fr;
				gap: var(--spacing);
				min-width: 0;
			}

			.chart-container {
				width: 100%;
				height: var(--chart-min-height);
				min-width: 0;
				overflow: hidden;
			}

			.chart-container-medium {
				height: var(--chart-medium-height);
			}

			.chart-container-large {
				height: var(--chart-large-height);
				width: 450px;
			}

			.chart-container-small {
				height: 200px;
			}

			.chart-container-gauge {
				width: 400px;
				height: 400px;
				max-width: 100%;
				margin: 0 auto;
				flex-shrink: 0;
			}

			@media (max-width: 500px) {
				.chart-container-gauge {
					width: 100%;
					height: 0;
					padding-bottom: 100%;
					position: relative;
				}

				.chart-container-gauge > div {
					position: absolute;
					top: 0;
					left: 0;
					width: 100%;
					height: 100%;
				}
			}

			.chart-container-year {
				height: 250px;
				width: 100%;
			}

			.activity-flow-container {
				display: flex;
				flex-direction: column;
				gap: var(--spacing);
				height: var(--chart-large-height);
			}

			#activity, #flow {
				width: 100%;
			}

			#activity {
				height: 200px;
				flex-shrink: 0;
			}

			#flow {
				height: 400px;
				flex: 1;
			}

			/* Tablet and up */
			@media (min-width: 768px) {
				.chart-row {
					grid-template-columns: minmax(0, 1000px) minmax(auto, max-content);
					min-width: 0;
				}

				.chart-row-with-gap {
					grid-template-columns: minmax(0, 1000px) auto minmax(auto, max-content);
					min-width: 0;
				}

				.activity-transition-container {
					grid-template-columns: minmax(0, 1000px) minmax(auto, max-content);
					min-width: 0;
				}

				/* Constrain left column containers. */
				.chart-row > :first-child,
				.activity-transition-container > :first-child {
					max-width: 1000px;
					min-width: 0;
					overflow: hidden;
				}

				/* Constrain right column to not expand but allow shrinking. */
				.chart-row > :last-child,
				.activity-transition-container > :last-child {
					max-width: 500px;
					min-width: 0;
					overflow: hidden;
				}

				#transition {
					width: 450px;
					min-width: 0;
					max-width: 450px;
				}
			}

			/* Desktop */
			@media (min-width: 1024px) {
				.dashboard-container {
					max-width: min(1600px, 100%);
					margin: 0;
					padding: 0 var(--spacing);
					width: 100%;
					overflow-x: auto;
				}

				.chart-row {
					grid-template-columns: minmax(0, 1000px) minmax(auto, max-content);
					min-width: 0;
				}

				.chart-row-with-gap {
					grid-template-columns: minmax(0, 1000px) 50px minmax(auto, max-content);
					min-width: 0;
				}

				.activity-transition-container {
					grid-template-columns: minmax(0, 1000px) minmax(auto, max-content);
					min-width: 0;
				}

				/* Constrain left column containers; allow shrinking, but max at 1000px. */
				.chart-row > :first-child,
				.activity-transition-container > :first-child {
					max-width: 1000px;
					min-width: 0;
					box-sizing: border-box;
					overflow: hidden;
				}

				/* Ensure chart containers inside don't expand beyond parent. */
				.chart-row > :first-child .chart-container,
				.activity-transition-container > :first-child .chart-container,
				.activity-flow-container .chart-container {
					max-width: 100%;
					box-sizing: border-box;
				}

				/* Constrain right column to not expand but allow shrinking. */
				.chart-row > :last-child,
				.activity-transition-container > :last-child {
					max-width: 500px;
					min-width: 0;
					overflow: hidden;
				}

				#transition {
					width: 450px;
					min-width: 0;
					max-width: 450px;
				}
			}

			/* Mobile: stack everything vertically. */
			@media (max-width: 767px) {
				.chart-container-gauge {
					width: min(100%, 400px);
					height: min(100vw, 400px);
				}

				.chart-container {
					height: auto;
					min-height: var(--chart-min-height);
				}

				.chart-container-medium {
					height: auto;
					min-height: var(--chart-medium-height);
				}

				.chart-container-large {
					height: auto;
					min-height: var(--chart-large-height);
				}

				.activity-flow-container {
					height: auto;
					min-height: var(--chart-large-height);
				}

				#activity {
					height: 200px;
				}

				#flow {
					height: 300px;
					min-height: 300px;
				}
			}
		</style>
		<script src="js/echarts-5.5.1.min.js"></script>
		<script src="js/jquery-3.7.0.min.js"></script>
	</head>
	<body>
		<div class="dashboard-container">
			<div class="chart-row chart-row-with-gap">
				<div id="day" class="chart-container chart-container-medium"></div>
				<div></div>
				<div id="dayGauge" class="chart-container chart-container-gauge"></div>
			</div>
			<div class="chart-row activity-transition-container">
				<div class="activity-flow-container">
					<div id="activity" class="chart-container chart-container-small"></div>
					<div id="flow" class="chart-container"></div>
				</div>
				<div id="transition" class="chart-container chart-container-large"></div>
			</div>
			<div class="chart-row chart-row-with-gap">
				<div id="week" class="chart-container chart-container-medium"></div>
				<div></div>
				<div id="weekGauge" class="chart-container chart-container-gauge"></div>
			</div>
			<div id="year" class="chart-container chart-container-year"></div>
		</div>
		<script type="text/javascript">

const second = 1000;
const minute = 60*second
const hour = 60*minute

const reloadEvery = minute;
const reloadEveryNotVisible = 10*minute;
const checkEvery = second;

var urlParams = new URL(window.location.href).searchParams;
var requestedDate = urlParams.get('date');

const visible = "visible";
const hidden = "hidden";
function changeVis(e) {
	const state = {
		focus: visible, focusin: visible, pageshow: visible,
		blur: hidden, focusout: hidden, pagehide: hidden
	};
	e = e || window.event;
	if (e.type in state) {
		document.body.className = state[e.type];
	} else {
		document.body.className = this[visibility] ? hidden : visible;
	}
}
var visibility = hidden;
if (visibility in document) {
	changeVis({type: document[visibility] ? "blur" : "focus"});
	document.addEventListener("visibilitychange", changeVis);
}

$.get(urlFor(requestedDate), function(data) {
	render(data);
});
var sinceReload = 0;
setInterval(function () {
	if (sinceReload <= reloadEveryNotVisible) {
		sinceReload += checkEvery;
	}
	const reload = sinceReload > reloadEveryNotVisible ||
		(sinceReload > reloadEvery && document.body.className == visible);
	console.log(reload, sinceReload, sinceReload > reloadEveryNotVisible, sinceReload > reloadEvery && document.body.className == visible)
	if (reload) {
		$.get(urlFor(requestedDate), function(data) {
			render(data);
		});
		sinceReload = 0;
	}
}, checkEvery);

var data = {};

function urlFor(date) {
	if (date == formatDate(new Date())) {
		date = '';
	}
	if (date != urlParams.get('date')) {
		if (date == '') {
			urlParams.delete('date')
		} else {
			urlParams.set('date', date)
		}
	}
	if (urlParams.size == 0) {
		return 'data/';
	}
	return 'data/?'+urlParams.toString();
}

function formatDate(d) {
	return [d.getFullYear(), ('0' + (d.getMonth() + 1)).slice(-2), ('0' + d.getDate()).slice(-2)].join('-');
}

function formatTime(date){
	function pad(n){ return n<10 ? '0'+n : n }
	var y = date.getFullYear();
	var mo = pad(date.getMonth()+1);
	var d = pad(date.getDate());
	var h = pad(date.getHours());
	var m = pad(date.getMinutes());
	var s = pad(date.getSeconds());
	var tzOff = date.getTimezoneOffset();
	if (tzOff == 0) {
		return `${y}-${mo}-${d}T${h}:${m}:${s}Z`;
	}
	var tzS = tzOff > 0 ? '-' : '+';
	var tzH = pad(Math.trunc(Math.abs(tzOff)/60));
	var tzM = pad(Math.abs(tzOff)%60);
	return `${y}-${mo}-${d}T${h}:${m}:${s}${tzS}${tzH}:${tzM}`;
}

function formatDuration(hours) {
	function frac(n) {
		return n-Math.trunc(n);
	}
	var h = Math.trunc(hours);
	var m = (60*frac(hours));
	var s = (60*frac(m));
	m = Math.trunc(m);
	s = Math.trunc(s);
	if (h != 0) {
		return h + 'h' + (Math.trunc(m) != 0 ? Math.trunc(m) + 'm' : '');
	}
	if (m != 0 && s != 0) {
		return Math.trunc(m) + 'm' + Math.trunc(s) + 's';
	}
	if (m != 0) {
		return Math.trunc(m) + 'm';
	}
	if (s != 0) {
		return Math.trunc(s) + 's';
	}
	return '-';
}

const hours = ['12a', '1a', '2a', '3a', '4a', '5a', '6a', '7a', '8a', '9a', '10a', '11a', '12p', '1p', '2p', '3p', '4p', '5p', '6p', '7p', '8p', '9p', '10p', '11p'];
const days = ['Saturday', 'Friday', 'Thursday', 'Wednesday', 'Tuesday', 'Monday', 'Sunday'];

// Ensure chart containers have explicit dimensions for eCharts.
function ensureChartDimensions() {
	var containers = document.querySelectorAll('.chart-container, #activity, #flow');
	containers.forEach(function(container) {
		var computedStyle = window.getComputedStyle(container);
		var width = computedStyle.width;
		var height = computedStyle.height;

		// For gauge containers, ensure square dimensions.
		if (container.classList.contains('chart-container-gauge')) {
			var size = Math.min(parseFloat(width) || 400, parseFloat(height) || 400, 500);
			container.style.width = size + 'px';
			container.style.height = size + 'px';
		} else {
			// For other containers, use computed dimensions.
			if (width && width !== 'auto' && width !== '0px') {
				container.style.width = width;
			}
			if (height && height !== 'auto' && height !== '0px') {
				container.style.height = height;
			}
		}
	});
}

// Wait for DOM and styles to be ready.
if (document.readyState === 'loading') {
	document.addEventListener('DOMContentLoaded', ensureChartDimensions);
} else {
	ensureChartDimensions();
}

var day = echarts.init(document.getElementById('day'), '');
day.setOption({
	title: {
		top: 30,
		left: 'center',
	},
	tooltip: {
		position: 'top',
		valueFormatter: function(d) {
			return formatDuration(d/60);
		}
	},
	xAxis: {
		type: 'category',
		data: hours
	},
	yAxis: {
		type: 'value',
		max: 60
	},
	series: [
		{
			type: 'bar'
		}
	]
});

var activity = echarts.init(document.getElementById('activity'));
activity.setOption({
	tooltip: {
		confine: true,
		showDelay: 50,
		formatter: function(params) {
			var d = formatDuration(params.value[3]/(3600*second));
			var bucket = params.value[4];
			var id = params.value[5];
			return params.marker + params.name + '  <b>' + d + '</b><br>' + formatTime(params.value[1]) + '—' + formatTime(params.value[2]) + ` (${bucket}:${id})`;
		}
	},
	dataZoom: [
		{
			type: 'slider',
			filterMode: 'weakFilter',
			showDataShadow: false,
			top: 0,
			labelFormatter: ''
		},
		{
			type: 'inside',
			filterMode: 'weakFilter'
		}
	],
	grid: {
		height: 75
	},
	xAxis: {
		splitLine: {
			show: false
		},
		axisLabel: {
			show: false
		}
	},
	yAxis: {
		data: []
	},
	series: [
		{
			type: 'custom',
			renderItem: function (params, api) {
				var categoryIndex = api.value(0);
				var start = api.coord([api.value(1), categoryIndex]);
				var end = api.coord([api.value(2), categoryIndex]);
				var height = api.size([0, 1])[1] * 0.6;
				var rectShape = echarts.graphic.clipRectByRect(
					{
						x: start[0],
						y: start[1] - height / 2,
						width: end[0] - start[0],
						height: height
					},
					{
						x: params.coordSys.x,
						y: params.coordSys.y,
						width: params.coordSys.width,
						height: params.coordSys.height
					}
				);
				return (
					rectShape && {
						type: 'rect',
						transition: ['shape'],
						shape: rectShape,
						style: api.style()
					}
				);
			},
			itemStyle: {
				opacity: 0.8
			},
			encode: {
				x: [1, 2],
				y: 0
			},
			data: null
		}
	]
});

var flow = echarts.init(document.getElementById('flow'));
flow.setOption({
	tooltip: {
		trigger: 'axis',
		valueFormatter: formatDuration,
		axisPointer: {
			type: 'line',
			lineStyle: {
				color: 'rgba(0,0,0,0.2)',
				width: 1,
				type: 'solid'
			}
		}
	},
	legend: {
		data: null
	},
	singleAxis: {
		top: 50,
		bottom: 50,
		left: 100,
		right: 100,
		axisTick: {},
		axisLabel: {
			show: false
		},
		type: 'time',
		axisPointer: {
			animation: true,
			label: {
				show: true
			}
		},
		splitLine: {
			show: true,
			lineStyle: {
				type: 'dashed',
				opacity: 0.2
			}
		}
	},
	series: [
		{
			type: 'themeRiver',
			emphasis: {
				itemStyle: {
					shadowBlur: 20,
					shadowColor: 'rgba(0, 0, 0, 0.8)'
				}
			},
			data: null
		}
	]
});

var transition = echarts.init(document.getElementById('transition'));
transition.setOption({
	tooltip: {},
	legend: [],
	series: [
		{
			type: 'graph',
			layout: 'force',
			data: null,
			links: null,
			categories: null,
			roam: true,
			draggable: true,
			force: {
				gravity: 1,

				repulsion: [1000, 10000],
				edgeLength: 10
			},
			label: {

			},

			},

			}
		}
	]
});

var week = echarts.init(document.getElementById('week'));
week.setOption({
	title: {
		top: 30,
		left: 'center',
		text: 'Weekly'
	},
	tooltip: {
		position: 'top',
		formatter: function(param) {

	},

	},

		}
	},

		max: 60,

	},
	series: [
		{
			name: 'Work',
			type: 'heatmap',
			data: null,
			label: {

			},
			emphasis: {

				}

});

var year = echarts.init(document.getElementById('year'));
year.setOption({
	title: {
		top: 30,
		left: 'center',
		text: 'Yearly'
	},
	tooltip: {
		triggerOn: 'mousemove',
		formatter: function(param) {

	},

	},
	calendar: {

});
year.on('click', function(params) {
	requestedDate = params.value[0];
	$.get(urlFor(requestedDate), function(data) {
		render(data);
	});
});

var dayGauge = gauge('dayGauge', 8);
var weekGauge = gauge('weekGauge', 40);

// Store all chart instances for resize handling.
var chartInstances = [day, activity, flow, transition, week, year, dayGauge, weekGauge];

// Debounce function for resize events.
function debounce(func, wait) {
	var timeout;
	return function() {
		var context = this;
		var args = arguments;
		clearTimeout(timeout);
		timeout = setTimeout(function() {
			func.apply(context, args);
		}, wait);
	};
}

// Handle window resize events.
var handleResize = debounce(function() {
	// Force layout recalculation by reading layout properties.
	document.body.offsetHeight;

	// Update gauge container dimensions first.
	var gaugeContainers = document.querySelectorAll('.chart-container-gauge');
	gaugeContainers.forEach(function(container) {
		var computedStyle = window.getComputedStyle(container);
		var parentWidth = container.parentElement ? 
			parseFloat(window.getComputedStyle(container.parentElement).width) : 400;
		var maxSize = Math.min(parentWidth * 0.9, 500);
		var size = Math.max(250, Math.min(maxSize, 400));
		container.style.width = size + 'px';
		container.style.height = size + 'px';
	});

	// Update left column parent containers to ensure they are
	// properly sized.
	var leftColumnContainers = document.querySelectorAll('.chart-row > :first-child, .activity-transition-container > :first-child');
	leftColumnContainers.forEach(function(container) {
		// Force re-flow by reading dimensions.
		var width = container.offsetWidth;
		var height = container.offsetHeight;
		// Remove any inline width that might prevent resizing.
		container.style.width = '';
	});

	// Force layout recalculation for all chart containers.
	var allChartContainers = document.querySelectorAll('#day, #activity, #flow, #transition, #week, #year, #dayGauge, #weekGauge');
	allChartContainers.forEach(function(container) {
		// Force re-flow by reading layout properties.
		var width = container.offsetWidth;
		var height = container.offsetHeight;
		// Remove any inline width that might prevent
		// natural resizing.
		container.style.width = '';
	});

	// Force a re-flow to ensure all dimensions are recalculated.
	document.body.offsetHeight;

	// Use requestAnimationFrame to ensure layout is complete
	// before resizing charts.
	requestAnimationFrame(function() {
		// Double RAF to ensure layout is fully settled.
		requestAnimationFrame(function() {
			// Resize all charts. eCharts will read the
			// current container dimensions.
			chartInstances.forEach(function(chart) {
				if (chart && !chart.isDisposed()) {
					try {
						chart.resize();
					} catch (e) {
						console.warn('Error resizing chart:', e);
					}
				}
			});
		});
	});
}, 250);

window.addEventListener('resize', handleResize);

// Also trigger resize after a short delay to ensure containers
// are sized.
setTimeout(function() {
	ensureChartDimensions();
	handleResize();
}, 100);

function gauge(id, hours) {
	const animationDuration = second;
	const animationDurationUpdate = second;
	const animationEasingUpdate = 'quarticInOut';

	var gauge = echarts.init(document.getElementById(id));
	gauge.setOption({
		animationEasing: animationEasingUpdate,
		animationDuration: animationDuration,
		animationDurationUpdate: animationDurationUpdate,
		animationEasingUpdate: animationEasingUpdate,
		dataset: {
			source: [[1, 0]]
		},
		tooltip: {
			show: false
		},
		angleAxis: {
			type: 'value',
			startAngle: 0,
			show: false,
			min: 0,
			max: hours
		},
		radiusAxis: {
			type: 'value',
			show: false
		},
		polar: {},
		series: [
			{
				type: 'custom',
				coordinateSystem: 'polar',
				renderItem: renderItem
			}
		]
	});
	return gauge;
}

function renderItem(params, api) {
	const panelImage = 'img/gauge_panel.png';

	if (!params.coordSys || !params.coordSys.cx || !params.coordSys.cy) {
		// Coordinate system not ready, return empty group.
		return { type: 'group', children: [] };
	}

	var valOnRadian = api.value(1);
	var coords = api.coord([api.value(0), valOnRadian]);
	if (!coords || coords.length < 4) {
		return { type: 'group', children: [] };
	}
	var polarEndRadian = coords[3];

	// Calculate responsive radius based on coordinate system
	// size, and use the smaller dimension to ensure the gauge fits.
	var coordWidth = params.coordSys.width || 400;
	var coordHeight = params.coordSys.height || 400;
	var coordSize = Math.min(coordWidth, coordHeight);
	var centerX = params.coordSys.cx || coordWidth / 2;
	var centerY = params.coordSys.cy || coordHeight / 2;

	// Use 50% of the smaller dimension, capped at 200px (original size).
	var _outerRadius = Math.min(coordSize * 0.5, 200);
	var _innerRadius = Math.min(coordSize * 0.425, 170);
	var _insidePanelRadius = Math.min(coordSize * 0.35, 140);

	// Ensure minimum sizes for visibility.
	if (_outerRadius < 100) {
		_outerRadius = 100;
		_innerRadius = 85;
		_insidePanelRadius = 70;
	}

	var imageStyle = {
		image: panelImage,
		x: centerX - _outerRadius,
		y: centerY - _outerRadius,
		width: _outerRadius * 2,
		height: _outerRadius * 2
	};
	return {
		type: 'group',
		children: [
			{
				type: 'image',
				style: imageStyle,
				clipPath: {
					type: 'sector',
					shape: {
						cx: centerX,
						cy: centerY,
						r: _outerRadius,
						r0: _innerRadius,
						startAngle: 0,
						endAngle: -polarEndRadian,
						transition: 'endAngle',
						enterFrom: { endAngle: 0 }
					}
				}
			},
			{
				type: 'image',
				style: imageStyle,
					clipPath: {
						type: 'polygon',
						shape: {
							points: makePointerPoints(centerX, centerY, polarEndRadian, _outerRadius)
						},
					extra: {
						polarEndRadian: polarEndRadian,
						transition: 'polarEndRadian',
						enterFrom: { polarEndRadian: 0 }
					},
					during: function(apiDuring) {
						apiDuring.setShape(
							'points',
							makePointerPoints(centerX, centerY, apiDuring.getExtra('polarEndRadian'), _outerRadius)
						);
					}
				}
			},
			{
				type: 'circle',
				shape: {
					cx: centerX,
					cy: centerY,
					r: _insidePanelRadius
				},
				style: {
					fill: '#fff',
					shadowBlur: 25,
					shadowOffsetX: 0,
					shadowOffsetY: 0,
					shadowColor: 'rgba(76,107,167,0.4)'
				}
			},
			{
				type: 'text',
				extra: {
					valOnRadian: valOnRadian,
					transition: 'valOnRadian',
					enterFrom: { valOnRadian: 0 }
				},
				style: {
					text: formatDuration(valOnRadian),
					fontSize: Math.max(24, Math.min(_outerRadius * 0.25, 50)),
					fontWeight: 700,
					x: centerX,
					y: centerY,
					fill: 'rgb(0,50,190)',
					align: 'center',
					verticalAlign: 'middle',
					enterFrom: { opacity: 0 }
				},
			}
		]
	};
}
function makePointerPoints(centerX, centerY, polarEndRadian, outerRadius) {
	const pointerInnerRadius = Math.min(outerRadius * 0.2, 40);
	return [
		convertToPolarPoint(centerX, centerY, outerRadius, polarEndRadian),
		convertToPolarPoint(centerX, centerY, outerRadius, polarEndRadian + Math.PI * 0.03 ),
		convertToPolarPoint(centerX, centerY, pointerInnerRadius, polarEndRadian)
	];
}
function convertToPolarPoint(centerX, centerY, radius, radian) {
	return [Math.cos(radian) * radius + centerX, -Math.sin(radian) * radius + centerY];
}

function render(data) {
	day.setOption({
		title: {
			text: dayTitle(requestedDate)
		},
		series: [
			{
				data: dayData(data),
			}
		]
	});

	// Trigger resize after rendering to ensure charts fit containers.
	setTimeout(function() {
		handleResize();
	}, 50);

	var categories = activityCategories(data);
	activity.setOption({
		xAxis: {
			min: dataDate(data),
			max: dataDate(data)+24*hour,
		},
		yAxis: {
			data: categories.list
		},
		series: [
			{
				data: activityData(data, categories.table)
			}
		]
	});

	flow.setOption({
		singleAxis: {
			min: dataDate(data),
			max: dataDate(data)+24*hour,
		},
		legend: {
			data: flowLegend(data)
		},
		series: [
			{
				data: flowData(data)
			}
		]
	});

	var transitions = transitionData(data);
	var categories = transitions.categories;
	transition.setOption({
		tooltip: {
			formatter: function(p) {
				if (p.dataType == 'edge') {
					return categories[p.data.source].name + '→' + categories[p.data.target].name + '  <b>' + p.data.value + '</b>';
				}
				return p.marker + p.name + '  <b>' + formatDuration(p.value) + '</b>';
			}
		},
		legend: [
			{
				data: categories.map(function (a) {
					return a.name;
				})
			}
		],
		series: [
			{
				data: transitions.nodes,
				links: transitions.links,
				categories: categories
			}
		]
	});

	week.setOption({
		series: [
			{
				data: weekMinutesPerHour(data)
			}
		]
	});

	dayGauge.setOption({
		dataset: {
			source: [[1, data?.day?.total_hours || 0]]
		}
	});

	weekGauge.setOption({
		dataset: {
			source: [[1, data?.week?.total_hours || 0]]
		}
	});

	year.setOption({
		calendar: {
			range: yearFrom(data),
		},
		series: {
			data: yearData(data)
		}
	});
}

function dataDate(data) {
	if (!data.date) {
		return new Date().setHours(0, 0, 0, 0);
	}
	return new Date(data.date).setHours(0, 0, 0, 0);
}

function dayTitle(date) {
	if (date == null || date == '' || date == formatDate(new Date())) {
		return 'Today';
	}
	return date;
}

function dayData(data) {
	var hours = [];
	for (let i = 0; i < 24; i++) {
		var h = ("0"+i).slice(-2);
		hours.push(data.day?.minutes[`${h}:00:00`] || 0);
	}
	return hours;
}

function activityCategories(data) {
	var table = new Map();
	var categories = [];
	if (!data?.day?.events) {
		return {table:table, list:categories};
	}
	// Reverse the order of the keys since they are
	// sorted ascending by Go, but eCharts starts
	// categories from the bottom of the axis.
	var idx = Object.keys(data.day.events).length-1;
	for (let [key, value] of Object.entries(data.day.events)) {
		if (table.has[key]) {
			continue;
		}
		table[key] = idx;
		categories.unshift(key);
		idx--;
	}
	return {table:table, list:categories};
}

function activityData(data, categories) {
	var activityData = [];
	if (!data?.day?.events) {
		return activityData
	}
	for (let [key, value] of Object.entries(data.day.events)) {
		if (key == '') {
			continue;
		}
		value.forEach(e => {
			var start = new Date(e.start);
			var end = new Date(e.end);

			var name = "";
			if (key == "window") {
				name = e.data?.app+" | "+e.data?.title+((e.data?.pid != undefined) ? " ("+e.data?.pid+")" : "");
			} else if (key == "afk") {
				if (e.data?.afk != undefined && !e.data.afk) {
					name = "not-afk"
				} else {
					return;
				}
			} else if (e.data?.activity) {
				name = e.data?.activity
			}
			activityData.push({
				name: name,
				value: [categories[key], start, end, end-start, e.bucket, e.id],
				itemStyle: {
					normal: {
						color: stringToColour(name)
					}
				}
			});
		});
	}    
	return activityData;
}

function stringToColour(str) {
	var hash = 0;
	for (var i = 0; i < str.length; i++) {
		hash = str.charCodeAt(i) + ((hash << 5) - hash);
	}
	var colour = '#';
	for (var i = 0; i < 3; i++) {
		var value = (hash >> (i * 8)) & 0xff;
		colour += ('00' + value.toString(16)).substr(-2);
	}
	return colour;
}

function flowLegend(data) {
	var table = new Map();
	var legend = [];
	if (!data?.day?.flow) {
		return legend;
	}
	for (let [key, value] of Object.entries(data.day.flow)) {
		if (table.has[key]) {
			continue;
		}
		table[key] = true;
		legend.push(key);
	}
	return legend;
}

function flowData(data) {
	var flow = [];
	if (!data?.day?.flow) {
		return flow;
	}
	function formatTime(date){
		function pad(n){ return n<10 ? '0'+n : n }
		var y = date.getFullYear();
		var mo = pad(date.getMonth()+1);
		var d = pad(date.getDate());
		var h = pad(date.getHours());
		var m = pad(date.getMinutes());
		var s = pad(date.getSeconds());
		return `${y}-${mo}-${d} ${h}:${m}:${s}`;
	}
	for (let [app, value] of Object.entries(data.day.flow)) {
		for (let [time, hours] of Object.entries(value)) {
			// Offset so the point is in the middle of the hour.
			var t = new Date(time);
			t.setTime(t.getTime()+30*minute);
			flow.push([formatTime(t), hours, app]);
		}
	}
	return flow;
}

function transitionData(data) {
	var transitions = data.day?.transitions;
	if (!transitions) {
		return transitions;
	}
	var nodes = transitions.nodes;
	var links = transitions.links;
	var categories = transitions.categories;
	return {nodes: nodes, links: links, categories: categories};
}

function weekMinutesPerHour(data) {
	var hours = [];
	if (!data.week?.hours) {
		return hours;
	}
	for (let [key, value] of Object.entries(data.week.hours)) {
		var date = new Date(key);
		var dow = date.getDay();
		var hod = date.getHours()
		hours.push([hod, 6-dow, value*60]);
	}
	return hours;
}

function yearFrom(data) {
	if (!data.year?.hours) {
		return new Date().getFullYear();
	}
	for (let [key, value] of Object.entries(data.year.hours)) {
		return key.slice(0, key.indexOf('-'))
	}
}

function yearData(data) {
	var yearHours = [];
	if (!data.year?.hours) {
		return yearHours;
	}
	for (let [key, value] of Object.entries(data.year.hours)) {
		yearHours.push([key, value]);
	}
	return yearHours;
}
